apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sahilrana7582/argocd-prac.git
    targetRevision: HEAD
    path: backend-app

  destination:
    server: https://kubernetes.default.svc
    namespace: backend-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true